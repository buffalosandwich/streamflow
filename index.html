<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SLV Streams Dashboard</title>
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
  h1 { font-size: 1.4em; margin: 10px 0; }
  #controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  button { padding: 8px 14px; border-radius: 6px; border: none; background: #0077cc; color: white; font-size: 0.95em; }
  button:active { transform: scale(0.98); }
  #status { font-size: 0.85em; color: #555; }
  .card { background: white; padding: 12px; margin-bottom: 12px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
  .name { font-size: 1.05em; font-weight: bold; margin-bottom: 4px; }
  .row { display: flex; flex-wrap: wrap; gap: 6px 12px; font-size: 0.9em; margin-bottom: 4px; }
  .label { font-weight: bold; }
  .value { font-weight: bold; }
  .trend-up { color: #008000; }
  .trend-down { color: #cc0000; }
  .trend-flat { color: #555555; }
  .badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 0.8em; margin-left: 4px; color: white; }
  .badge-pos { background: #2e8b57; }
  .badge-neg { background: #b22222; }
  .badge-zero { background: #777777; }
  .updated { font-size: 0.8em; color: #666; margin-top: 4px; }
  .alert { margin-top: 6px; padding: 4px 6px; border-radius: 6px; background: #ffe5e5; color: #b00000; font-size: 0.8em; }
  canvas { width: 100% !important; height: 140px !important; margin-top: 6px; }
</style>
<script>
  const apiKey = "1p/J4DJW9hidoM37lgx2i+SqjdPFp8J+";

const stations = [
  { id: "NCLCONCO", name: "North Clear Creek Below Continental Reservoir" },
  { id: "ARKSALCO", name: "Arkansas River at Salida, CO" },
  { id: "ALABELCO", name: "Alamosa River Below Terrace Reservoir" },
  { id: "ALATERCO", name: "Alamosa River Above Terrace Reservoir" },
  { id: "BEVBEVCO", name: "Beaver Creek Below Beaver Creek Reservoir" },
  { id: "CONPLACO", name: "Conejos River Below Platoro Reservoir" },
  { id: "CONMOGCO", name: "Conejos River Near Mogote" },
  { id: "LAJCAPCO", name: "Lajara Creek at Gallegos Ranch Near Capulin" },
  { id: "RIOMILCO", name: "Rio Grande at Thirty Mile Bridge Near Creede" },
  { id: "RIOWAGCO", name: "Rio Grande at Wagon Wheel Gap" },
  { id: "RIOTRICO", name: "Rio Grande Above Trinchera Creek Near La Sauses" },
  { id: "TRIMTNCO", name: "Trinchera Creek Above Mountain Home Reservoir" }
];

// FIXED: Automatically sort stations alphabetically by name
stations.sort((a, b) => a.name.localeCompare(b.name));

const PARAMS = {
  DISCHRG: { label: "Flow", unit: "cfs" },
  GAGE_HT: { label: "Gage", unit: "ft" },
  WTR_TEMP: { label: "Temp", unit: "°F" }
};

const DWR_PARAM_MAP = {
  DISCHRG: "DISCHRG",
  GAGE_HT: "GAGE_HT",  
  WTR_TEMP: "WATTEMP", 
  WATERTEMP: "WATERTEMP" 
};

function fmtDate(date) {
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${m}/${d}/${date.getFullYear()}`;
}

function percentChange(current, past) {
  if (current == null || past == null || past === 0) return null;
  return ((current - past) / past) * 100;
}

function badgeClass(pct) {
  if (pct == null) return "badge badge-zero";
  if (pct > 1) return "badge badge-pos";
  if (pct < -1) return "badge badge-neg";
  return "badge badge-zero";
}

function formatPct(pct) {
  if (pct == null) return "n/a";
  const v = pct.toFixed(1);
  return (pct > 0 ? "+" : "") + v + "%";
}

function trendInfo(current, prev) {
  if (current == null || prev == null) return { arrow: "→", cls: "trend-flat" };
  if (current > prev * 1.01) return { arrow: "↑", cls: "trend-up" };
  if (current < prev * 0.99) return { arrow: "↓", cls: "trend-down" };
  return { arrow: "→", cls: "trend-flat" };
}

async function fetchDWRHistory(stationId, paramKey) {
  const dwrParam = DWR_PARAM_MAP[paramKey] || paramKey;
  if (!dwrParam) return [];
  const now = new Date();
  const tenDaysAgo = new Date(now.getTime() - 10 * 24 * 60 * 60 * 1000);
  
  const url = `https://dwr.state.co.us/Rest/GET/api/v2/telemetrystations/telemetrytimeseriesday?format=json&abbrev=${stationId}&parameter=${dwrParam}&startDate=${fmtDate(tenDaysAgo)}&endDate=${fmtDate(now)}&apiKey=${encodeURIComponent(apiKey)}`;
  try {
    const res = await fetch(url);
    if (!res.ok) return [];
    const json = await res.json();
    const list = json.ResultList || [];
    return list.map(d => ({
      time: d.measDate || d.measDateTime, 
      value: d.measValue != null ? Number(d.measValue) : null
    }));
  } catch(e) {
    return [];
  }
}

function getLatestAndPrev(history) {
  if (!history || !history.length) {
    return { latestValue: null, latestTime: null, prevValue: null, prevTime: null };
  }
  const latest = history[history.length - 1];
  const prev = history.length > 1 ? history[history.length - 2] : null;
  return {
    latestValue: latest.value,
    latestTime: latest.time,
    prevValue: prev ? prev.value : null,
    prevTime: prev ? prev.time : null
  };
}

const container = document.getElementById("streams");
stations.forEach(s => {
  const card = document.createElement("div");
  card.className = "card";
  card.id = `card-${s.id}`;
  card.innerHTML = `
    <div class="name">${s.name}</div>
    <div class="row" id="row-${s.id}-DISCHRG"></div>
    <div class="row" id="row-${s.id}-GAGE_HT"></div>
    <div class="row" id="row-${s.id}-WTR_TEMP"></div>
    <div class="updated" id="updated-${s.id}"></div>
    <div class="alert" id="alert-${s.id}" style="display:none;"></div>
    <canvas id="chart-${s.id}"></canvas>
  `;
  container.appendChild(card);
});

const charts = {};

function value24hAgo(history, latestTime) {
  if (!history.length || !latestTime) return null;
  const latestDate = new Date(latestTime);
  const target = latestDate.getTime() - 24 * 60 * 60 * 1000;
  let best = null;
  for (const h of history) {
    const t = new Date(h.time).getTime();
    if (t <= target) best = h;
    else break;
  }
  return best ? best.value : null;
}

async function loadStation(station) {
  const sid = station.id;
  const status = document.getElementById("status");
  status.textContent = `Loading ${station.name}...`;
  try {
    const histFlow = await fetchDWRHistory(sid, "DISCHRG");
    const histGage = await fetchDWRHistory(sid, "GAGE_HT").catch(() => []);
    
    let histTemp = await fetchDWRHistory(sid, "WTR_TEMP").catch(() => []);
    if (!histTemp.length) {
      histTemp = await fetchDWRHistory(sid, "WATERTEMP").catch(() => []);
    }

    const flow = getLatestAndPrev(histFlow);
    const gage = getLatestAndPrev(histGage);
    const temp = getLatestAndPrev(histTemp);

    const flow24 = value24hAgo(histFlow, flow.latestTime);
    const gage24 = value24hAgo(histGage, gage.latestTime);
    const temp24 = value24hAgo(histTemp, temp.latestTime);

    const flowPct = percentChange(flow.latestValue, flow24);
    const gagePct = percentChange(gage.latestValue, gage24);
    const tempPct = percentChange(temp.latestValue, temp24);

    let rapidAlert = "";
    if (flow.latestValue != null && flow.prevValue != null) {
      const risePct = percentChange(flow.latestValue, flow.prevValue);
      if (risePct != null && risePct > 5) {
        rapidAlert = `⚠ Rapid rise in flow: ${risePct.toFixed(1)}% increase since last reading.`;
      }
    }

    function updateRow(paramKey, data, pct) {
      const row = document.getElementById(`row-${sid}-${paramKey}`);
      const meta = PARAMS[paramKey];
      const trend = trendInfo(data.latestValue, data.prevValue);
      const badgeCls = badgeClass(pct);
      const badgeText = formatPct(pct);
      const valText = data.latestValue != null ? data.latestValue.toFixed(2) : "—";
      row.innerHTML = `
        <span class="label">${meta.label}:</span>
        <span class="value ${trend.cls}">${valText} ${meta.unit} ${trend.arrow}</span>
        <span class="${badgeCls}">${badgeText}</span>
      `;
    }

    updateRow("DISCHRG", flow, flowPct);
    updateRow("GAGE_HT", gage, gagePct);
    updateRow("WTR_TEMP", temp, tempPct);

    const updated = document.getElementById(`updated-${sid}`);
    updated.textContent = flow.latestTime ? `Updated: ${flow.latestTime}` : "";

    const alertDiv = document.getElementById(`alert-${sid}`);
    if (rapidAlert) {
      alertDiv.style.display = "block";
      alertDiv.textContent = rapidAlert;
    } else {
      alertDiv.style.display = "none";
    }

    const ctx = document.getElementById(`chart-${sid}`).getContext("2d");
    
    const allTimes = new Set();
    histFlow.forEach(h => { if(h.time) allTimes.add(h.time) });
    histGage.forEach(h => { if(h.time) allTimes.add(h.time) });
    histTemp.forEach(h => { if(h.time) allTimes.add(h.time) });
    const labels = Array.from(allTimes).sort((a, b) => new Date(a) - new Date(b));

    function mapToLabels(labels, series) {
      const map = {};
      series.forEach(s => { if(s.time) map[s.time] = s.value; });
      return labels.map(t => map[t] ?? null);
    }
    
    const flowSeries = mapToLabels(labels, histFlow);
    const gageSeries = mapToLabels(labels, histGage);
    const tempSeries = mapToLabels(labels, histTemp);

    if (charts[sid]) charts[sid].destroy();
    
    charts[sid] = new Chart(ctx, {
      type: "line",
      data: {
        labels: labels,
        datasets: [
          { label: "Flow (cfs)", data: flowSeries, borderColor: "rgba(0, 123, 255, 1)", backgroundColor: "rgba(0, 123, 255, 0.1)", borderWidth: 2, pointRadius: 2, tension: 0.3, yAxisID: 'yFlow', spanGaps: true },
          { label: "Gage (ft)", data: gageSeries, borderColor: "rgba(255, 165, 0, 1)", backgroundColor: "rgba(255, 165, 0, 0.1)", borderWidth: 2, pointRadius: 2, tension: 0.3, yAxisID: 'yGage', spanGaps: true },
          { label: "Temp (°F)", data: tempSeries, borderColor: "rgba(128, 0, 128, 1)", backgroundColor: "rgba(128, 0, 128, 0.1)", borderWidth: 2, pointRadius: 2, tension: 0.3, yAxisID: 'yTemp', spanGaps: true }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, labels: { boxWidth: 10, font: { size: 9 } } },
          tooltip: { mode: "index", intersect: false }
        },
        scales: { 
          x: { display: false }, 
          yFlow: { type: 'linear', display: false, position: 'left' },
          yGage: { type: 'linear', display: false, position: 'right' },
          yTemp: { type: 'linear', display: false, position: 'right' }
        }
      }
    });
    status.textContent = "";
  } catch (e) {
    const card = document.getElementById(`card-${sid}`);
    const errDiv = document.createElement("div");
    errDiv.style.color = "#b00000";
    errDiv.style.fontSize = "0.85em";
    errDiv.textContent = "Error loading data.";
    card.appendChild(errDiv);
    console.error("Error loading station", sid, e);
  }
}

async function loadAll() {
  const status = document.getElementById("status");
  status.textContent = "Loading all stations...";
  for (const s of stations) {
    await loadStation(s);
  }
  status.textContent = "All stations loaded. Refresh whenever you like.";
}

loadAll();
</script>
</body>
</html>
