<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
  h1 { font-size: 1.4em; margin: 10px 0; }
  #controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  button { padding: 8px 14px; border-radius: 6px; border: none; background: #0077cc; color: white; font-size: 0.95em; cursor: pointer; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #888; cursor: not-allowed; }
  #status { font-size: 0.85em; color: #555; }
  #streams { transition: opacity 0.3s ease; }
  .card { background: white; padding: 12px; margin-bottom: 12px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
  .name { font-size: 1.05em; font-weight: bold; margin-bottom: 4px; }
  .name a { color: #0077cc; text-decoration: none; }
  .name a:hover { text-decoration: underline; }
  .row { display: flex; flex-wrap: wrap; gap: 6px 12px; font-size: 0.9em; margin-bottom: 4px; }
  .label { font-weight: bold; }
  .value { font-weight: bold; }
  .trend-up { color: #008000; }
  .trend-down { color: #cc0000; }
  .trend-flat { color: #555555; }
  .badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 0.8em; margin-left: 4px; color: white; }
  .badge-pos { background: #2e8b57; }
  .badge-neg { background: #b22222; }
  .badge-zero { background: #777777; }
  .updated { font-size: 0.8em; color: #666; margin-top: 4px; }
  .alert { margin-top: 6px; padding: 4px 6px; border-radius: 6px; background: #ffe5e5; color: #b00000; font-size: 0.8em; }
  canvas { width: 100% !important; height: 140px !important; margin-top: 6px; }
</style>
</head>
